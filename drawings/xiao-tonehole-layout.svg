<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">

  <!-- Background and title block -->
  <rect x="0" y="0" width="900" height="380" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="0" y="330" width="900" height="50" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="330" x2="900" y2="330" stroke="#333" stroke-width="1.5"/>
  <text x="10" y="345" font-size="12" font-weight="bold">XIAO — TONE HOLE LAYOUT (PLAN VIEW, UNWRAPPED)</text>
  <text x="10" y="358">Instrument: G Nan Xiao | XIAO-001 | Units: in (mm) | Scale: 1:2 (approx)</text>
  <text x="10" y="371">Drawing: DWG-002 | Date: 2026-05-08 | Heifer Zephyr</text>
  <text x="580" y="345" font-weight="bold" fill="#cc0000">⚠ ALL POSITIONS FIRST-ORDER ESTIMATES</text>
  <text x="580" y="358" fill="#cc0000">Drill 1–2 mm toward foot of model position.</text>
  <text x="580" y="371" fill="#cc0000">Final positions set by measurement on prototype.</text>

  <!-- Body outline (unwrapped top surface) -->
  <!-- Scale: 22.5 in bore → 720 px → 32 px/in. Foot at x=80, head at x=800 -->
  <rect x="80" y="120" width="720" height="90" fill="#e8dcc8" stroke="#444" stroke-width="2" rx="3"/>

  <!-- Foot end label -->
  <text x="60" y="165" font-size="11" text-anchor="middle" font-weight="bold">FOOT</text>
  <text x="60" y="178" font-size="11" text-anchor="middle">(OPEN)</text>
  <text x="60" y="191" font-size="9" text-anchor="middle">DATUM</text>
  <text x="60" y="201" font-size="9" text-anchor="middle">0.000</text>

  <!-- Head end label -->
  <text x="830" y="160" font-size="10">MOUTH-</text>
  <text x="830" y="172" font-size="10">PIECE</text>
  <text x="830" y="184" font-size="10">END</text>

  <!-- Bore centerline -->
  <line x1="80" y1="165" x2="800" y2="165" stroke="#2266aa" stroke-width="0.8" stroke-dasharray="5,3"/>
  <text x="420" y="173" font-size="8" fill="#2266aa">bore centerline</text>

  <!-- Mouthpiece section boundary -->
  <line x1="720" y1="115" x2="720" y2="215" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="722" y="113" font-size="9" fill="#888">mouthpiece</text>
  <text x="722" y="123" font-size="9" fill="#888">section (2.5 in)</text>

  <!-- Scale: 32px per inch. Foot = x=80. Dist from foot → x = 80 + dist*32 -->
  <!-- Hole positions (from foot):
       H1: 20.48 in → x = 80 + 20.48*32 = 735
       H2: 19.33 in → x = 80 + 19.33*32 = 699
       H3: 18.25 in → x = 80 + 18.25*32 = 664
       H4: 17.22 in → x = 80 + 17.22*32 = 631
       H5: 15.34 in → x = 80 + 15.34*32 = 571
       H6: 13.67 in → x = 80 + 13.67*32 = 517
       H7: 12.90 in → x = 80 + 12.90*32 = 493
       H8: 12.18 in → x = 80 + 12.18*32 = 470

  Wait - scale: 720 px for 22.47 in bore → 32.04 px/in. Let me recalculate:
  Actually let me use 30 px/in to fit in 720 px for 22.47 in → 674 px, leaving margin.
  Foot = x=80.
  H1: 80 + 20.48*30 = 80 + 614 = 694
  H2: 80 + 19.33*30 = 80 + 580 = 660
  H3: 80 + 18.25*30 = 80 + 548 = 628
  H4: 80 + 17.22*30 = 80 + 517 = 597
  H5: 80 + 15.34*30 = 80 + 460 = 540
  H6: 80 + 13.67*30 = 80 + 410 = 490
  H7: 80 + 12.90*30 = 80 + 387 = 467
  H8: 80 + 12.18*30 = 80 + 365 = 445
  -->

  <!-- Hole 1 — RH pinky — E4 — 20.48 in -->
  <circle cx="694" cy="165" r="12" fill="#ffddaa" stroke="#cc5500" stroke-width="1.5"/>
  <text x="694" y="169" font-size="9" text-anchor="middle" font-weight="bold">1</text>
  <line x1="694" y1="178" x2="694" y2="250" stroke="#cc5500" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="694" y="260" font-size="8" text-anchor="middle" fill="#cc5500">H1</text>
  <text x="694" y="270" font-size="8" text-anchor="middle" fill="#cc5500">E4</text>
  <text x="694" y="280" font-size="8" text-anchor="middle">20.48 in</text>
  <text x="694" y="290" font-size="8" text-anchor="middle">(520 mm)</text>
  <text x="694" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 2 — RH ring — F4 — 19.33 in -->
  <circle cx="660" cy="165" r="12" fill="#ffddaa" stroke="#cc5500" stroke-width="1.5"/>
  <text x="660" y="169" font-size="9" text-anchor="middle" font-weight="bold">2</text>
  <line x1="660" y1="178" x2="660" y2="250" stroke="#cc5500" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="660" y="260" font-size="8" text-anchor="middle" fill="#cc5500">H2</text>
  <text x="660" y="270" font-size="8" text-anchor="middle" fill="#cc5500">F4</text>
  <text x="660" y="280" font-size="8" text-anchor="middle">19.33 in</text>
  <text x="660" y="290" font-size="8" text-anchor="middle">(491 mm)</text>
  <text x="660" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 3 — RH middle — Gb4 — 18.25 in -->
  <circle cx="628" cy="165" r="12" fill="#ffddaa" stroke="#cc5500" stroke-width="1.5"/>
  <text x="628" y="169" font-size="9" text-anchor="middle" font-weight="bold">3</text>
  <line x1="628" y1="178" x2="628" y2="250" stroke="#cc5500" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="628" y="260" font-size="8" text-anchor="middle" fill="#cc5500">H3</text>
  <text x="628" y="270" font-size="8" text-anchor="middle" fill="#cc5500">Gb4</text>
  <text x="628" y="280" font-size="8" text-anchor="middle">18.25 in</text>
  <text x="628" y="290" font-size="8" text-anchor="middle">(464 mm)</text>
  <text x="628" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 4 — RH index — G4 (KEY NOTE) — 17.22 in -->
  <circle cx="597" cy="165" r="13" fill="#aaddff" stroke="#0044aa" stroke-width="2"/>
  <text x="597" y="169" font-size="9" text-anchor="middle" font-weight="bold">4★</text>
  <line x1="597" y1="179" x2="597" y2="250" stroke="#0044aa" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="597" y="260" font-size="8" text-anchor="middle" fill="#0044aa">H4 ★KEY</text>
  <text x="597" y="270" font-size="8" text-anchor="middle" fill="#0044aa">G4</text>
  <text x="597" y="280" font-size="8" text-anchor="middle">17.22 in</text>
  <text x="597" y="290" font-size="8" text-anchor="middle">(437 mm)</text>
  <text x="597" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Gap between RH and LH groups (H4→H5: 1.88 in / 47.8 mm) -->
  <line x1="597" y1="140" x2="540" y2="140" stroke="#009900" stroke-width="0.8"/>
  <text x="568" y="137" font-size="8" fill="#009900" text-anchor="middle">47.8 mm gap</text>
  <text x="568" y="127" font-size="8" fill="#009900" text-anchor="middle">(RH→LH span)</text>

  <!-- Hole 5 — LH ring — A4 — 15.34 in -->
  <circle cx="540" cy="165" r="12" fill="#ddffd0" stroke="#336600" stroke-width="1.5"/>
  <text x="540" y="169" font-size="9" text-anchor="middle" font-weight="bold">5</text>
  <line x1="540" y1="178" x2="540" y2="250" stroke="#336600" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="540" y="260" font-size="8" text-anchor="middle" fill="#336600">H5</text>
  <text x="540" y="270" font-size="8" text-anchor="middle" fill="#336600">A4</text>
  <text x="540" y="280" font-size="8" text-anchor="middle">15.34 in</text>
  <text x="540" y="290" font-size="8" text-anchor="middle">(390 mm)</text>
  <text x="540" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 6 — LH middle — B4 — 13.67 in -->
  <circle cx="490" cy="165" r="12" fill="#ddffd0" stroke="#336600" stroke-width="1.5"/>
  <text x="490" y="169" font-size="9" text-anchor="middle" font-weight="bold">6</text>
  <line x1="490" y1="178" x2="490" y2="250" stroke="#336600" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="490" y="260" font-size="8" text-anchor="middle" fill="#336600">H6</text>
  <text x="490" y="270" font-size="8" text-anchor="middle" fill="#336600">B4</text>
  <text x="490" y="280" font-size="8" text-anchor="middle">13.67 in</text>
  <text x="490" y="290" font-size="8" text-anchor="middle">(347 mm)</text>
  <text x="490" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 7 — LH index — C5 — 12.90 in -->
  <circle cx="467" cy="165" r="12" fill="#ddffd0" stroke="#336600" stroke-width="1.5"/>
  <text x="467" y="169" font-size="9" text-anchor="middle" font-weight="bold">7</text>
  <line x1="467" y1="178" x2="467" y2="250" stroke="#336600" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="467" y="260" font-size="8" text-anchor="middle" fill="#336600">H7</text>
  <text x="467" y="270" font-size="8" text-anchor="middle" fill="#336600">C5</text>
  <text x="467" y="280" font-size="8" text-anchor="middle">12.90 in</text>
  <text x="467" y="290" font-size="8" text-anchor="middle">(328 mm)</text>
  <text x="467" y="300" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est.</text>

  <!-- Hole 8 — LH thumb — Db5 — 12.18 in (rear/thumb hole, shown offset) -->
  <circle cx="445" cy="138" r="11" fill="#f0d8ff" stroke="#550088" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="445" y="142" font-size="9" text-anchor="middle" font-weight="bold">8</text>
  <text x="445" y="115" font-size="8" text-anchor="middle" fill="#550088">H8 (THUMB — REAR)</text>
  <text x="445" y="105" font-size="8" text-anchor="middle" fill="#550088">Db5 | 12.18 in (309 mm)</text>
  <text x="445" y="95" font-size="7" text-anchor="middle" fill="#cc0000">⚠ est. | shown offset from front-hole line</text>

  <!-- RH / LH hand group labels -->
  <rect x="575" y="195" width="135" height="16" fill="#fff5e0" stroke="#cc5500" stroke-width="0.7" rx="2"/>
  <text x="642" y="207" font-size="9" text-anchor="middle" fill="#cc5500">← RIGHT HAND (H1–H4) →</text>
  <rect x="435" y="195" width="120" height="16" fill="#f0fff0" stroke="#336600" stroke-width="0.7" rx="2"/>
  <text x="495" y="207" font-size="9" text-anchor="middle" fill="#336600">← LEFT HAND (H5–H8) →</text>

  <!-- Scale bar -->
  <line x1="80" y1="95" x2="110" y2="95" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="90" x2="80" y2="100" stroke="#333" stroke-width="1.5"/>
  <line x1="110" y1="90" x2="110" y2="100" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="88" font-size="9" text-anchor="middle">1 in</text>
  <text x="95" y="78" font-size="8" text-anchor="middle">(30 px)</text>

</svg>
