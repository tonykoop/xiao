<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">

  <rect x="0" y="0" width="900" height="380" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="0" y="330" width="900" height="50" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="330" x2="900" y2="330" stroke="#333" stroke-width="1.5"/>
  <text x="10" y="345" font-size="12" font-weight="bold">XIAO — HEADSTOCK-DRIVEN DEEP-BORE DRILLING SETUP</text>
  <text x="10" y="358">Technique: Uncle Carpenter method (ref: headstock-driven-deep-bore-drilling.md) | Drawing: DWG-004 | 2026-05-08</text>
  <text x="10" y="371">Lathe taper: confirm MT2/MT3 on your lathe before ordering | Heifer Zephyr / XIAO-001</text>
  <text x="640" y="345" fill="#cc0000" font-weight="bold">⚠ DRILL SCRAP BLANK FIRST</text>
  <text x="640" y="358" fill="#cc0000">Validate bore wander before tonewood</text>

  <!-- Lathe bed (simplified) -->
  <rect x="30" y="280" width="840" height="30" fill="#ccc" stroke="#666" stroke-width="1.5" rx="3"/>
  <text x="420" y="300" font-size="10" text-anchor="middle" fill="#555">LATHE BED</text>

  <!-- Headstock (left) -->
  <rect x="30" y="160" width="110" height="120" fill="#aaaacc" stroke="#333" stroke-width="2" rx="4"/>
  <text x="85" y="205" font-size="10" text-anchor="middle" font-weight="bold">HEAD-</text>
  <text x="85" y="218" font-size="10" text-anchor="middle" font-weight="bold">STOCK</text>

  <!-- Spindle -->
  <rect x="140" y="198" width="40" height="14" fill="#888" stroke="#444" stroke-width="1"/>
  <text x="160" y="207" font-size="8" text-anchor="middle" fill="#fff">MT</text>

  <!-- Jacobs chuck -->
  <rect x="180" y="193" width="45" height="24" fill="#666" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="202" y="207" font-size="8" text-anchor="middle" fill="#fff">CHUCK</text>

  <!-- Long drill bit -->
  <rect x="225" y="202" width="420" height="6" fill="#444" stroke="#222" stroke-width="1"/>
  <polygon points="645,205 670,201 670,209" fill="#444" stroke="#222" stroke-width="1"/>
  <text x="430" y="196" font-size="9" text-anchor="middle">Long drill bit — pilot: 1/4 in (min 18 in) | finish: 55/64 in</text>
  <text x="430" y="188" font-size="9" text-anchor="middle">⚠ Conservative RPM — long bits whip at high speed</text>

  <!-- Spindle axis / centerline -->
  <line x1="30" y1="205" x2="870" y2="205" stroke="#2266aa" stroke-width="0.7" stroke-dasharray="5,4"/>
  <text x="870" y="202" font-size="8" fill="#2266aa" text-anchor="end">spindle axis</text>

  <!-- Blank (stationary) — square cross-section shown as rectangle -->
  <rect x="530" y="170" width="150" height="70" fill="#e8dcc8" stroke="#884400" stroke-width="2" rx="2"/>
  <text x="605" y="205" font-size="10" text-anchor="middle" fill="#664400">BLANK</text>
  <text x="605" y="218" font-size="10" text-anchor="middle" fill="#664400">1.5×1.5×26"</text>
  <text x="605" y="231" font-size="9" text-anchor="middle" fill="#cc0000">STATIONARY</text>

  <!-- Bore entry mark on blank -->
  <circle cx="530" cy="205" r="5" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <text x="510" y="248" font-size="8" fill="#cc0000" text-anchor="middle">center</text>
  <text x="510" y="258" font-size="8" fill="#cc0000" text-anchor="middle">mark</text>

  <!-- Tailstock carrier / V-block fixture -->
  <rect x="680" y="175" width="90" height="105" fill="#bbddbb" stroke="#336600" stroke-width="2" rx="3"/>
  <text x="725" y="215" font-size="9" text-anchor="middle" fill="#224400">TAILSTOCK</text>
  <text x="725" y="227" font-size="9" text-anchor="middle" fill="#224400">CARRIER</text>
  <text x="725" y="240" font-size="9" text-anchor="middle" fill="#224400">(V-block or</text>
  <text x="725" y="252" font-size="9" text-anchor="middle" fill="#224400">sq. pocket)</text>

  <!-- Anti-rotation clamps -->
  <rect x="528" y="163" width="18" height="14" fill="#ffcc00" stroke="#cc8800" stroke-width="1.5" rx="1"/>
  <text x="537" y="173" font-size="7" text-anchor="middle">CLAMP</text>
  <rect x="528" y="243" width="18" height="14" fill="#ffcc00" stroke="#cc8800" stroke-width="1.5" rx="1"/>
  <text x="537" y="253" font-size="7" text-anchor="middle">CLAMP</text>
  <text x="537" y="160" font-size="8" fill="#cc8800" text-anchor="middle">anti-rotation</text>
  <text x="537" y="152" font-size="8" fill="#cc8800" text-anchor="middle">clamps</text>
  <text x="537" y="270" font-size="8" fill="#cc0000" text-anchor="middle">friction ALONE</text>
  <text x="537" y="280" font-size="8" fill="#cc0000" text-anchor="middle">not sufficient</text>

  <!-- Tailstock quill advance arrow -->
  <line x1="780" y1="205" x2="690" y2="205" stroke="#006600" stroke-width="2" marker-end="url(#grnarr2)"/>
  <text x="820" y="198" font-size="9" fill="#006600" text-anchor="middle">QUILL</text>
  <text x="820" y="210" font-size="9" fill="#006600" text-anchor="middle">ADVANCES</text>
  <text x="820" y="222" font-size="9" fill="#006600" text-anchor="middle">blank →</text>

  <!-- Peck depth annotation -->
  <line x1="645" y1="140" x2="645" y2="168" stroke="#aa3300" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="590" y="120" width="115" height="32" fill="#fff5e0" stroke="#aa3300" stroke-width="1" rx="2"/>
  <text x="647" y="133" font-size="8" text-anchor="middle" fill="#aa3300">Peck depth: ~0.5 in</text>
  <text x="647" y="145" font-size="8" text-anchor="middle" fill="#aa3300">Retract to clear chips</text>
  <text x="647" y="157" font-size="8" text-anchor="middle" fill="#aa3300">after each peck</text>

  <!-- Depth stop tape flag -->
  <rect x="386" y="192" width="30" height="18" fill="#ffff00" stroke="#aaaa00" stroke-width="1" rx="1"/>
  <text x="401" y="203" font-size="7" text-anchor="middle">DEPTH</text>
  <text x="401" y="212" font-size="7" text-anchor="middle">STOP</text>
  <text x="401" y="183" font-size="8" fill="#aaaa00" text-anchor="middle">tape flag at</text>
  <text x="401" y="175" font-size="8" fill="#aaaa00" text-anchor="middle">25 in from chuck</text>

  <!-- Safety zone callout -->
  <rect x="135" y="145" width="105" height="35" fill="#ffe0e0" stroke="#cc0000" stroke-width="1.5" rx="3"/>
  <text x="187" y="159" font-size="9" text-anchor="middle" fill="#cc0000">⚠ DANGER ZONE</text>
  <text x="187" y="172" font-size="8" text-anchor="middle" fill="#cc0000">spinning chuck</text>
  <text x="187" y="182" font-size="8" text-anchor="middle" fill="#cc0000">KEEP HANDS CLEAR</text>

  <!-- Step sequence note -->
  <rect x="30" y="60" width="500" height="90" fill="#f0f8ff" stroke="#2266aa" stroke-width="1" rx="3"/>
  <text x="40" y="77" font-size="9" font-weight="bold" fill="#2266aa">DRILLING SEQUENCE (per assembly-manual.md Stage 2)</text>
  <text x="40" y="91" font-size="9">1. Scrap blank first — measure bore wander, must be &lt;0.030 in</text>
  <text x="40" y="104" font-size="9">2. Pilot bit: 1/4 in | Peck 0.5 in at a time | 500–800 RPM max</text>
  <text x="40" y="117" font-size="9">3. Step up: intermediate bit(s) → 55/64 in finish bit</text>
  <text x="40" y="130" font-size="9">4. Ream/lap to 0.866 in final bore | Measure at 3 stations</text>
  <text x="40" y="143" font-size="9">5. Turn OD from bore axis as datum — NOT from original blank centers</text>

  <defs>
    <marker id="grnarr2" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#006600"/>
    </marker>
  </defs>
</svg>
