<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">

  <rect x="0" y="0" width="700" height="420" fill="#fff" stroke="#333" stroke-width="1"/>
  <rect x="0" y="370" width="700" height="50" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
  <line x1="0" y1="370" x2="700" y2="370" stroke="#333" stroke-width="1.5"/>
  <text x="10" y="385" font-size="11" font-weight="bold">XIAO — EMBOUCHURE DETAIL (2× SCALE, SCHEMATIC)</text>
  <text x="10" y="398">Notch dimensions TBD — refine by prototype voicing | Drawing: DWG-003 | 2026-05-08</text>
  <text x="450" y="385" fill="#cc0000" font-weight="bold">ALL DIMS TBD</text>
  <text x="450" y="398" fill="#cc0000">Set by ear on prototype</text>

  <!-- Cross-section of mouthpiece end (enlarged) -->
  <!-- OD circle — 1.338 in → at 2× scale → 80px radius -->
  <circle cx="240" cy="195" r="80" fill="#e8dcc8" stroke="#444" stroke-width="2"/>
  <!-- Bore circle — 0.866 in → at 2× scale → 51.96px → 52px radius -->
  <circle cx="240" cy="195" r="52" fill="#c8e8ff" stroke="#2266aa" stroke-width="1.5"/>

  <!-- U-notch cutout (top of body) — width ~11mm at 2× scale → ~52px, depth ~5mm → ~24px -->
  <!-- Notch from y = 195-80=115 (top of OD) down to y = 195-80+24=139 -->
  <rect x="214" y="115" width="52" height="28" fill="#fff" stroke="#cc3300" stroke-width="1.5"/>

  <!-- Inner bevel (angled cut at bore edge) -->
  <!-- The bevel goes from the bore tangent at top (y=195-52=143) at ~45° angle -->
  <polygon points="214,143 266,143 255,125 225,125" fill="#ffddaa" stroke="#cc3300" stroke-width="1" opacity="0.7"/>
  <text x="240" y="137" font-size="8" text-anchor="middle" fill="#cc3300">BEVEL</text>
  <text x="240" y="147" font-size="8" text-anchor="middle" fill="#cc3300">~45°</text>

  <!-- Labels — bore and OD -->
  <text x="310" y="198" font-size="10" fill="#2266aa">Bore ID: 0.866 in</text>
  <text x="310" y="210" font-size="10" fill="#2266aa">(22.0 mm)</text>
  <text x="330" y="145" font-size="10" fill="#664400">OD: 1.338 in</text>
  <text x="330" y="157" font-size="10" fill="#664400">(34.0 mm)</text>

  <!-- Notch width dimension -->
  <line x1="214" y1="108" x2="266" y2="108" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="214" y1="103" x2="214" y2="113" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="266" y1="103" x2="266" y2="113" stroke="#cc3300" stroke-width="0.8"/>
  <text x="240" y="103" font-size="9" text-anchor="middle" fill="#cc3300">Width: ~10–12 mm TBD</text>

  <!-- Notch depth dimension -->
  <line x1="275" y1="115" x2="275" y2="143" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="270" y1="115" x2="280" y2="115" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="270" y1="143" x2="280" y2="143" stroke="#cc3300" stroke-width="0.8"/>
  <text x="285" y="132" font-size="9" fill="#cc3300">Depth:</text>
  <text x="285" y="143" font-size="9" fill="#cc3300">~5 mm TBD</text>

  <!-- Bore axis crosshairs -->
  <line x1="140" y1="195" x2="340" y2="195" stroke="#2266aa" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="115" x2="240" y2="275" stroke="#2266aa" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="145" y="192" font-size="8" fill="#2266aa">bore axis</text>

  <!-- Player's lip position -->
  <ellipse cx="240" cy="100" rx="30" ry="10" fill="#ffaaaa" stroke="#aa0000" stroke-width="1" opacity="0.7"/>
  <text x="290" y="103" font-size="10" fill="#aa0000">player's lower lip</text>

  <!-- Airstream arrow -->
  <line x1="240" y1="92" x2="240" y2="125" stroke="#0066cc" stroke-width="2" marker-end="url(#bluarr)"/>
  <text x="255" y="107" font-size="9" fill="#0066cc">airstream</text>
  <text x="255" y="118" font-size="9" fill="#0066cc">(jet)</text>

  <!-- Split arrows at bevel edge -->
  <line x1="240" y1="140" x2="220" y2="155" stroke="#006600" stroke-width="1.5" marker-end="url(#grnarr)"/>
  <line x1="240" y1="140" x2="260" y2="155" stroke="#cc6600" stroke-width="1.5" marker-end="url(#ornarr)"/>
  <text x="180" y="170" font-size="8" fill="#006600">→ into bore</text>
  <text x="260" y="170" font-size="8" fill="#cc6600">→ outside</text>
  <text x="180" y="180" font-size="8" fill="#006600">(excites</text>
  <text x="260" y="180" font-size="8" fill="#cc6600">(wasted)</text>
  <text x="180" y="190" font-size="8" fill="#006600">standing wave)</text>

  <!-- Side-view inset -->
  <rect x="410" y="60" width="260" height="280" fill="#f8f8f8" stroke="#999" stroke-width="1" rx="3"/>
  <text x="540" y="78" font-size="10" text-anchor="middle" font-weight="bold">SIDE VIEW (schematic)</text>

  <!-- Body side view -->
  <rect x="430" y="100" width="220" height="60" fill="#e8dcc8" stroke="#444" stroke-width="1.5" rx="2"/>
  <!-- Bore in side -->
  <rect x="430" y="114" width="220" height="32" fill="#c8e8ff" stroke="#2266aa" stroke-width="0.8"/>
  <!-- Notch in side view -->
  <rect x="608" y="100" width="42" height="18" fill="#fff" stroke="#cc3300" stroke-width="1.2"/>
  <!-- Bevel in side -->
  <line x1="608" y1="118" x2="650" y2="100" stroke="#cc3300" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Dimension: total head section -->
  <line x1="430" y1="90" x2="650" y2="90" stroke="#333" stroke-width="0.8"/>
  <line x1="430" y1="85" x2="430" y2="95" stroke="#333" stroke-width="0.8"/>
  <line x1="650" y1="85" x2="650" y2="95" stroke="#333" stroke-width="0.8"/>
  <text x="540" y="87" font-size="9" text-anchor="middle">mouthpiece section: 2.5 in (Nan Xiao)</text>

  <!-- Bore centerline -->
  <line x1="425" y1="130" x2="655" y2="130" stroke="#2266aa" stroke-width="0.6" stroke-dasharray="4,3"/>

  <!-- Wall labels -->
  <line x1="420" y1="100" x2="420" y2="114" stroke="#664400" stroke-width="0.7"/>
  <line x1="415" y1="100" x2="425" y2="100" stroke="#664400" stroke-width="0.7"/>
  <line x1="415" y1="114" x2="425" y2="114" stroke="#664400" stroke-width="0.7"/>
  <text x="400" y="108" font-size="8" fill="#664400" text-anchor="middle">wall</text>
  <text x="400" y="118" font-size="8" fill="#664400" text-anchor="middle">0.236"</text>

  <!-- Notch position from end -->
  <line x1="608" y1="170" x2="650" y2="170" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="608" y1="165" x2="608" y2="175" stroke="#cc3300" stroke-width="0.8"/>
  <line x1="650" y1="165" x2="650" y2="175" stroke="#cc3300" stroke-width="0.8"/>
  <text x="629" y="185" font-size="8" text-anchor="middle" fill="#cc3300">notch at</text>
  <text x="629" y="195" font-size="8" text-anchor="middle" fill="#cc3300">head end</text>

  <!-- Playing angle note -->
  <text x="430" y="220" font-size="9">Playing angle:</text>
  <text x="430" y="232" font-size="9">~45° from vertical</text>
  <text x="430" y="244" font-size="9">(or near-vertical).</text>
  <text x="430" y="256" font-size="9">Player angles</text>
  <text x="430" y="268" font-size="9">instrument toward</text>
  <text x="430" y="280" font-size="9">body slightly.</text>
  <text x="430" y="295" font-size="9" fill="#cc0000">Embouchure: set</text>
  <text x="430" y="307" font-size="9" fill="#cc0000">by ear, not by</text>
  <text x="430" y="319" font-size="9" fill="#cc0000">dimension alone.</text>

  <defs>
    <marker id="bluarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0066cc"/>
    </marker>
    <marker id="grnarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#006600"/>
    </marker>
    <marker id="ornarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cc6600"/>
    </marker>
  </defs>
</svg>
